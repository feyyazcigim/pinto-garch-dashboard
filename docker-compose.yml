services:
  backend:
    build: ./backend
    container_name: pinto-garch-backend
    ports:
      - "8000:8000"
    environment:
      CACHE_TTL_SECONDS: "600"
      ALLOWED_ORIGINS: "http://localhost:8080,http://localhost:5173"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: pinto-garch-frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend
    restart: unless-stopped
